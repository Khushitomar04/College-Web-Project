<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" widht:100>
    <title> Student Admission Form</title>
</head>
<body>
    
   <center>
    <h2>Student Admission form</h2>
    <br><br>


    <form  >
<fieldset>


        <label>Full Name:</label>
        <input type="Name" placeholder="Enter your Name">
        <br><br>
        <label>Email:</label>
        <input type="email" placeholder= "Enter your email">
        <br><br>

        <label>Contact Number:</label>
        
        <input type="contact number" placeholder= "Enter your contact number">
        <br><br>
        
        <label>Gender:</label>
        <input type="radio" name="gender">Male
        <input type="radio" name="gender">Female
        
        <br><br>
        
        <label> Course: </label>
        <select>
            <option>B.Tech</option>
             <option>BCA</option>
              <option>BBA</option>
               <option> MCA</option>
                <option>MBA</option>
        </select>
        <br><br>
        
        <label> 10th Percentage:</label>
         <input type="percentage" placeholder= "Enter your 12th percentage">
        <br><br>
         <label> 12th Percentage:</label>
         <input type="percentage" placeholder= "Enter your 10th percentage">
        <br><br>
        
        <label>Address:</label>
        <input type="Address" placeholder= "Enter your Address">
        <br><br>
        <label> document upload:</label>
        <input type="file" accept ="image/*">
        <br><br>
        <button type="submit"> Submit</button>


    </form>
    </center>
</fieldset>
</body>
</html>
